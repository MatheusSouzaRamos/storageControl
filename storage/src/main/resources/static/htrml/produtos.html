<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque3000</title>
    <link rel="shortcut icon" href="../img/ico.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="buscarProdutos2()">
    <header>
        <h1>Produtos</h1>
    </header>
    <nav>
        <a href="gerencia.html">Gerência</a>
        <a href="produtos.html">Produtos</a>
    </nav>
    <main>
        <div class="container-container">
            <div class="container">
                <h2 class="h2Inserir">Inserir Produto</h2>
                <input type="text" placeholder="Nome" id="NOMEINSERT">
                <br>
                <input type="number" placeholder="Quantidade" id="QNTINSERT" min="0">
                <br>
                <input type="number" placeholder="Valor" id="VALORINSERT" min="0">
                <br>
                <button onclick="inserirProduto(); atualizarTabela2()">Inserir</button>
            </div>
            <div class="container">
                <h2>Alterar Produto</h2>
                <input type="number" placeholder="id" min="1" id="idupdate">
                <br>
                <input type="text" placeholder="Nome" id="nomeupdate">
                <br>
                <input type="number" placeholder="Quantidade" id="qntupdate" min="0">
                <br>
                <input type="number" placeholder="Valor" id="valorupdate" min="0">
                <br>
                <button onclick="updateProduto(); atualizarTabela2()">Alterar</button>
            </div>
            <div class="container">
                <h2>Deletar Produto</h2>
                <input type="number" placeholder="id" id="iddeletar" class="input-delete">
                <br>
                <button onclick="deletarProduto(); atualizarTabela2()">Deletar</button>
            </div>
            <div class="container">
                <h2>Quantificar Produto</h2>
                <p>Neste campo, utilizando o ID, é somado ou subtraído a quantidade informada.</p>
                <input type="number" id="idAlterar" placeholder="id">
                <br>
                <input type="number" id="quantidadeAlterar" placeholder="Quantidade">
                <br>
                <button onclick="alterarQuantidadeProduto(); atualizarTabela2()">Quantificar</button>
            </div>
        </div>
        
        <h3 class="h3ProdutosPag">Produtos Cadastrados</h3>
        <button onclick="buscarProdutos2()" class="buttonAtualizar">Atualizar</button>
        <div id="resultadoBuscaProduto2" class="table-produtos"></div>

    </main>
    <script src="../script/produtos.js"></script>
</body>
</html>
