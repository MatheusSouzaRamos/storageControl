<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque3000</title>
    <link rel="shortcut icon" href="../img/ico.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1>Gerencia de Estoque</h1>
    </header>
    <nav>
        <a href="gerencia.html">Gerencia</a>
        <a href="produtos.html">Produtos</a>
    </nav>

    <button onclick="buscarProdutos()">Todos</button>
    <input type="number" placeholder="ID" id="idBuscar">
    <button onclick="buscarProdutosId()">Por ID</button>
    <br>
    <input type="text" placeholder="Nome" id="NOMEINSERT">
    <input type="number" placeholder="Quantidade" id="QNTINSERT" min="0">
    <input type="number" placeholder="Valor" id="VALORINSERT" min="0">
    <button onclick="inserirProduto()">Inserir</button>
    <br>
    <input type="number" placeholder="id" min="1" id="idupdate">
    <input type="text" placeholder="Nome" id="nomeupdate">
    <input type="number" placeholder="Quantidade" id="qntupdate" min="0">
    <input type="number" placeholder="Valor" id="valorupdate" min="0">
    <button onclick="updateProduto()">Update</button>
    <br>
    <input type="number" placeholder="id" id="iddeletar">
    <button onclick="deletarProduto()">Deletar</button>

    <script src="../script/produtos.js"></script>
</body>
</html>
